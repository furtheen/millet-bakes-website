<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Millet Bakes – Healthy Snacks Baked with Love</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brown-900: #2C1810;
      --brown-800: #3D2314;
      --brown-700: #5C3317;
      --brown-600: #7B4019;
      --brown-500: #A0522D;
      --amber-400: #D4924A;
      --amber-300: #E8B87D;
      --cream-100: #FDF6EC;
      --cream-200: #F8EDD9;
      --cream-300: #F0DDB8;
      --green-fresh: #5C7A3E;
      --green-light: #8BAD5C;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--cream-100);
      color: var(--brown-900);
      overflow-x: hidden;
    }

    html { scroll-behavior: smooth; }

    /* ── NAVBAR ─────────────────────────────────────── */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(253, 246, 236, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(212, 146, 74, 0.2);
      padding: 0 1.5rem;
      height: 68px;
      display: flex; align-items: center; justify-content: space-between;
      transition: box-shadow 0.3s;
    }
    .navbar.scrolled { box-shadow: 0 4px 24px rgba(44,24,16,0.12); }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem; font-weight: 900;
      color: var(--brown-800);
      letter-spacing: -0.5px;
      display: flex; align-items: center; gap: 8px;
    }
    .nav-logo span { color: var(--amber-400); }

    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      text-decoration: none;
      font-size: 0.875rem; font-weight: 500;
      color: var(--brown-700);
      letter-spacing: 0.3px;
      transition: color 0.2s;
      position: relative;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
      height: 2px; background: var(--amber-400);
      transform: scaleX(0); transition: transform 0.25s;
    }
    .nav-links a:hover { color: var(--brown-900); }
    .nav-links a:hover::after { transform: scaleX(1); }

    .nav-cta {
      background: var(--green-fresh);
      color: white; border: none;
      padding: 0.5rem 1.25rem;
      border-radius: 100px;
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      text-decoration: none;
      display: flex; align-items: center; gap: 6px;
    }
    .nav-cta:hover { background: #4a6632; transform: translateY(-1px); }

    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
    .hamburger span {
      display: block; height: 2px; width: 24px;
      background: var(--brown-800); border-radius: 2px;
      transition: all 0.3s;
    }

    /* ── HERO ────────────────────────────────────────── */
    .hero {
      min-height: 100vh;
      background:
        linear-gradient(160deg, rgba(44,24,16,0.72) 0%, rgba(92,51,23,0.55) 50%, rgba(160,82,45,0.3) 100%),
        url('https://images.unsplash.com/photo-1606313564200-e75d5e30476c?w=1400&q=80') center/cover no-repeat;
      display: flex; align-items: center;
      padding: 6rem 1.5rem 3rem;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(to top, var(--cream-100), transparent);
    }

    .hero-content {
      max-width: 640px;
      position: relative; z-index: 2;
    }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.3);
      color: white; border-radius: 100px;
      padding: 6px 16px; font-size: 0.8rem; font-weight: 500;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.6s ease both;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 900; line-height: 1.1;
      color: white;
      margin-bottom: 1.25rem;
      animation: fadeUp 0.7s 0.1s ease both;
    }
    .hero h1 em { color: var(--amber-300); font-style: normal; }

    .hero p {
      font-size: 1.05rem; color: rgba(255,255,255,0.85);
      line-height: 1.65; max-width: 480px;
      margin-bottom: 2rem;
      animation: fadeUp 0.7s 0.2s ease both;
    }

    .hero-buttons {
      display: flex; gap: 1rem; flex-wrap: wrap;
      animation: fadeUp 0.7s 0.3s ease both;
    }

    .btn-whatsapp {
      background: #25D366; color: white;
      border: none; border-radius: 100px;
      padding: 0.85rem 2rem;
      font-size: 1rem; font-weight: 600;
      cursor: pointer; text-decoration: none;
      display: flex; align-items: center; gap: 8px;
      transition: all 0.2s; box-shadow: 0 8px 24px rgba(37,211,102,0.4);
    }
    .btn-whatsapp:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(37,211,102,0.5); }

    .btn-outline {
      background: transparent; color: white;
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 100px; padding: 0.85rem 2rem;
      font-size: 1rem; font-weight: 500;
      cursor: pointer; text-decoration: none;
      transition: all 0.2s;
    }
    .btn-outline:hover { background: rgba(255,255,255,0.15); border-color: white; }

    .hero-stats {
      display: flex; gap: 2.5rem; margin-top: 3rem;
      animation: fadeUp 0.7s 0.4s ease both;
    }
    .stat { color: white; }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem; font-weight: 700; color: var(--amber-300);
    }
    .stat-label { font-size: 0.78rem; opacity: 0.75; }

    /* ── SECTION COMMONS ─────────────────────────────── */
    .section { padding: 5rem 1.5rem; }
    .section-tag {
      display: inline-block;
      font-size: 0.75rem; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--amber-400); margin-bottom: 0.75rem;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 800;
      color: var(--brown-900); line-height: 1.2; margin-bottom: 1rem;
    }
    .section-sub {
      font-size: 1rem; color: var(--brown-600);
      max-width: 520px; line-height: 1.65;
    }
    .section-header { margin-bottom: 3rem; }
    .container { max-width: 1100px; margin: 0 auto; }

    /* ── FEATURES STRIP ──────────────────────────────── */
    .features-strip {
      background: var(--brown-900);
      padding: 1.25rem 1.5rem;
      display: flex; gap: 2rem;
      overflow-x: auto; white-space: nowrap;
      scrollbar-width: none;
    }
    .features-strip::-webkit-scrollbar { display: none; }
    .feat-item {
      display: inline-flex; align-items: center; gap: 8px;
      color: var(--cream-200); font-size: 0.85rem; font-weight: 500;
      flex-shrink: 0;
    }
    .feat-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--amber-400); flex-shrink: 0; }

    /* ── PRODUCTS ────────────────────────────────────── */
    .products-section { background: var(--cream-200); }

    .categories {
      display: flex; gap: 0.75rem; flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }
    .cat-btn {
      padding: 0.45rem 1.2rem; border-radius: 100px;
      border: 2px solid var(--cream-300);
      background: white; color: var(--brown-700);
      font-size: 0.82rem; font-weight: 500; cursor: pointer;
      transition: all 0.2s;
    }
    .cat-btn.active, .cat-btn:hover {
      background: var(--brown-800); color: white; border-color: var(--brown-800);
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    .product-card {
      background: white; border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(44,24,16,0.07);
      transition: transform 0.25s, box-shadow 0.25s;
      cursor: pointer;
      animation: fadeUp 0.5s ease both;
    }
    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 36px rgba(44,24,16,0.14);
    }

    .product-img {
      width: 100%; height: 200px; object-fit: cover;
      background: var(--cream-300);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
    }

    .product-body { padding: 1.25rem; }
    .product-tag {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--green-fresh);
      margin-bottom: 0.4rem;
    }
    .product-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem; font-weight: 700;
      color: var(--brown-900); margin-bottom: 0.4rem;
    }
    .product-desc {
      font-size: 0.82rem; color: var(--brown-600);
      line-height: 1.55; margin-bottom: 1rem;
    }
    .product-footer {
      display: flex; align-items: center; justify-content: space-between;
    }
    .product-price {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; font-weight: 800; color: var(--brown-800);
    }
    .product-price span { font-size: 0.85rem; font-weight: 400; color: var(--brown-500); }
    .btn-order {
      background: var(--brown-800); color: white;
      border: none; border-radius: 100px;
      padding: 0.5rem 1.2rem; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: all 0.2s; display: flex; align-items: center; gap: 5px;
    }
    .btn-order:hover { background: var(--brown-700); transform: scale(1.04); }

    /* ── WHY US ──────────────────────────────────────── */
    .why-section {
      background: linear-gradient(135deg, var(--brown-900) 0%, var(--brown-700) 100%);
      position: relative; overflow: hidden;
    }
    .why-section::before {
      content: '';
      position: absolute; top: -60px; right: -60px;
      width: 300px; height: 300px; border-radius: 50%;
      background: rgba(212,146,74,0.1);
    }
    .why-section .section-title { color: white; }
    .why-section .section-tag { color: var(--amber-300); }
    .why-section .section-sub { color: rgba(255,255,255,0.65); }

    .why-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.5rem;
    }
    .why-card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 2rem 1.5rem;
      transition: background 0.25s, transform 0.25s;
    }
    .why-card:hover { background: rgba(255,255,255,0.12); transform: translateY(-4px); }
    .why-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: rgba(212,146,74,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; margin-bottom: 1.25rem;
    }
    .why-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; font-weight: 700; color: white;
      margin-bottom: 0.5rem;
    }
    .why-card p { font-size: 0.83rem; color: rgba(255,255,255,0.6); line-height: 1.55; }

    /* ── TESTIMONIALS ────────────────────────────────── */
    .testimonials-section { background: var(--cream-100); }

    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    .testimonial-card {
      background: white; border-radius: 20px;
      padding: 1.75rem;
      box-shadow: 0 2px 20px rgba(44,24,16,0.07);
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .testimonial-card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(44,24,16,0.12); }
    .quote-mark {
      font-family: 'Playfair Display', serif;
      font-size: 4rem; line-height: 0.5; color: var(--amber-300);
      margin-bottom: 0.5rem; display: block;
    }
    .testimonial-text {
      font-size: 0.9rem; color: var(--brown-700); line-height: 1.65;
      margin-bottom: 1.25rem;
    }
    .testimonial-stars { color: #F59E0B; font-size: 0.85rem; margin-bottom: 0.75rem; }
    .testimonial-author {
      display: flex; align-items: center; gap: 10px;
    }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--cream-300);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 700; color: var(--brown-700);
    }
    .author-name { font-weight: 600; font-size: 0.88rem; color: var(--brown-900); }
    .author-loc { font-size: 0.75rem; color: var(--brown-500); }

    /* ── ABOUT ───────────────────────────────────────── */
    .about-section { background: var(--cream-200); }
    .about-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem; align-items: center;
    }
    .about-img-wrap {
      position: relative;
    }
    .about-img {
      width: 100%; border-radius: 24px; object-fit: cover; height: 420px;
      background: var(--cream-300);
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem;
      box-shadow: 0 16px 48px rgba(44,24,16,0.15);
    }
    .about-badge-float {
      position: absolute; bottom: 24px; right: -20px;
      background: white; border-radius: 16px;
      padding: 1rem 1.25rem;
      box-shadow: 0 8px 24px rgba(44,24,16,0.12);
      display: flex; align-items: center; gap: 10px;
    }
    .about-badge-float .num {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; font-weight: 900; color: var(--brown-800);
    }
    .about-badge-float .lbl { font-size: 0.75rem; color: var(--brown-600); line-height: 1.3; }

    .about-text p {
      font-size: 0.95rem; color: var(--brown-700); line-height: 1.8;
      margin-bottom: 1rem;
    }
    .about-chips { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1.5rem; }
    .chip {
      padding: 0.4rem 1rem; border-radius: 100px;
      background: white; border: 2px solid var(--cream-300);
      font-size: 0.8rem; font-weight: 500; color: var(--brown-700);
    }

    /* ── CTA SECTION ─────────────────────────────────── */
    .cta-section {
      background:
        linear-gradient(135deg, rgba(92,122,62,0.92) 0%, rgba(139,173,92,0.88) 100%),
        url('https://images.unsplash.com/photo-1509440159596-0249088772ff?w=1200&q=80') center/cover;
      text-align: center; padding: 5rem 1.5rem;
    }
    .cta-section h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 900;
      color: white; margin-bottom: 1rem;
    }
    .cta-section p { color: rgba(255,255,255,0.8); margin-bottom: 2rem; font-size: 1rem; max-width: 480px; margin-left: auto; margin-right: auto; }

    /* ── FOOTER ──────────────────────────────────────── */
    .footer {
      background: var(--brown-900);
      padding: 3rem 1.5rem 1.5rem;
      color: rgba(255,255,255,0.7);
    }
    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 3rem; margin-bottom: 2.5rem;
    }
    .footer-brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem; font-weight: 900; color: white;
      margin-bottom: 0.75rem;
    }
    .footer-brand-name span { color: var(--amber-400); }
    .footer-desc { font-size: 0.85rem; line-height: 1.65; color: rgba(255,255,255,0.55); }
    .footer-col h4 { color: white; font-size: 0.88rem; font-weight: 600; margin-bottom: 1rem; letter-spacing: 0.5px; }
    .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
    .footer-col ul li a { color: rgba(255,255,255,0.55); text-decoration: none; font-size: 0.85rem; transition: color 0.2s; }
    .footer-col ul li a:hover { color: var(--amber-300); }
    .footer-contact-item { display: flex; align-items: flex-start; gap: 8px; font-size: 0.85rem; color: rgba(255,255,255,0.55); margin-bottom: 0.6rem; }
    .footer-divider { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 1.25rem; }
    .footer-bottom { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .footer-copy { font-size: 0.78rem; color: rgba(255,255,255,0.35); }

    .social-links { display: flex; gap: 0.75rem; }
    .social-link {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.6); text-decoration: none;
      font-size: 0.9rem; transition: background 0.2s, color 0.2s;
    }
    .social-link:hover { background: var(--amber-400); color: white; }

    /* ── MOBILE NAV DRAWER ───────────────────────────── */
    .mobile-nav {
      position: fixed; top: 68px; left: 0; right: 0; z-index: 99;
      background: rgba(253, 246, 236, 0.98);
      backdrop-filter: blur(16px);
      padding: 1.5rem;
      transform: translateY(-110%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
      border-bottom: 1px solid rgba(212,146,74,0.2);
      box-shadow: 0 8px 32px rgba(44,24,16,0.1);
    }
    .mobile-nav.open { transform: translateY(0); }
    .mobile-nav ul { list-style: none; display: flex; flex-direction: column; gap: 0; }
    .mobile-nav ul li a {
      display: block; padding: 1rem 0;
      text-decoration: none; color: var(--brown-800);
      font-size: 1.05rem; font-weight: 500;
      border-bottom: 1px solid rgba(212,146,74,0.15);
    }
    .mobile-nav .mobile-cta { margin-top: 1.25rem; display: block; text-align: center; }

    /* ── ANIMATIONS ──────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      opacity: 0; transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    /* ── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-cta.desktop { display: none; }
      .hamburger { display: flex; }

      .about-inner { grid-template-columns: 1fr; gap: 2rem; }
      .about-badge-float { right: 0; }

      .footer-grid { grid-template-columns: 1fr 1fr; }
      .footer-brand { grid-column: 1 / -1; }

      .hero-stats { gap: 1.5rem; }
    }

    @media (max-width: 480px) {
      .footer-grid { grid-template-columns: 1fr; }
      .hero-buttons { flex-direction: column; }
      .btn-whatsapp, .btn-outline { justify-content: center; }
    }

    /* Floating WA Button */
    .float-wa {
      position: fixed; bottom: 24px; right: 20px; z-index: 200;
      width: 56px; height: 56px; border-radius: 50%;
      background: #25D366; color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; text-decoration: none;
      box-shadow: 0 8px 24px rgba(37,211,102,0.45);
      transition: transform 0.2s, box-shadow 0.2s;
      animation: pulse 2.5s infinite;
    }
    .float-wa:hover { transform: scale(1.12); }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 24px rgba(37,211,102,0.45); }
      50% { box-shadow: 0 8px 32px rgba(37,211,102,0.7), 0 0 0 8px rgba(37,211,102,0.15); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const WA_NUMBER = "6380712931"; // ← Replace with Shivani's number

    function waLink(msg = "Hi, I'd like to place an order!") {
      return `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
    }

    const products = [
      {
        id: 1, category: "Brownies",
        image: "images/ragi-brownie.jpg",
        name: "Ragi Mixed Nuts Brownie",
        desc: "Rich fudgy ragi brownie loaded with cashews, almonds & walnuts. No maida, no white sugar.",
        price: "₹180", unit: "/ 200g",
        badge: "Bestseller"
      },
      {
        id: 2, category: "Brownies",
        image: "images/Screenshot(560).png",
        name: "Eggless Ragi Brownie",
        desc: "100% eggless, soft & decadent. Made with jaggery & pure cocoa. Perfect guilt-free treat.",
        price: "₹160", unit: "/ 200g",
        badge: "Eggless"
      },
      {
        id: 3, category: "Brownies",
        image: "images/Screenshot(561).png",
        name: "Karuppukavuni Arisi Plum Brownie",
        desc: "Black rice brownie with plum — antioxidant-rich, dense & indulgent. Butter + jaggery based.",
        price: "₹200", unit: "/ 200g",
        badge: "Unique"
      },
      {
        id: 4, category: "Cookies",

    function useScrollFade() {
      useEffect(() => {
        const obs = new IntersectionObserver(
          (entries) => entries.forEach(e => e.target.classList.toggle('visible', e.isIntersecting)),

        );
        document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));
        return () => obs.disconnect();
      }, []);
    }

        window.addEventListener('scroll', handler);
        return () => window.removeEventListener('scroll', handler);
      }, []);

      return (
        <>
          <nav className={`navbar${scrolled ? ' scrolled' : ''}`}>
